  const [filterLevel, setFilterLevel] = useState('ALL');

    try {
      const saved = localStorage.getItem('vq-sched-v1');

    } catch(e) {}

    const updated = { ...completed, [day]: !completed[day] };
    setCompleted(updated);
    try { localStorage.setItem('vq-sched-v1', JSON.stringify(updated)); } catch(e) {}

                    const isNext = nextDay?.day === d.day;
                    return (
                      <div key={d.day} onClick={() => toggleDay(d.day)} style={{ display:'flex', alignItems:'flex-start', gap:12, padding:'12px 14px', background: done ? 'rgba(34,197,94,0.06)' : isNext ? 'rgba(124,111,255,0.08)' : 'rgba(255,255,255,0.025)', border:`1px solid ${isNext ? 'rgba(124,111,255,0.3)' : done ? 'rgba(34,197,94,0.15)' : 'rgba(255,255,255,0.06)'}`, borderRadius: i===days.length-1 ? '0 0 12px 12px' : 0, borderTop: i===0 ? 'none' : undefined, cursor:'pointer', marginBottom: i<days.length-1 ? 1 : 0 }}>
                        <div style={{ width:22, height:22, borderRadius:7, border: done ? 'none' : '2px solid rgba(255,255,255,0.2)', background: done ? '#22c55e' : 'transparent', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, marginTop:2, fontSize:12, transition:'all 0.2s', boxShadow: done ? '0 0 8px rgba(34,197,94,0.4)' : 'none', color:'#fff', fontWeight:700 }}>{done && '✓'}</div>
                        <div style={{ flex:1 }}>
                          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:3 }}>
                            <span style={{ fontSize:10, color:'#475569', fontWeight:600 }}>DIA {d.day}</span>
                            <span style={{ fontSize:10, padding:'1px 7px', borderRadius:99, background:tc.bg, border:`1px solid ${tc.border}`, color:tc.color, fontWeight:600 }}>{tc.icon} {tc.label}</span>
                          </div>
                          <div style={{ fontSize:14, fontWeight: d.type==='revisao' ? 700 : 600, color: done ? '#64748b' : d.type==='revisao' ? '#fcd34d' : '#e2e8f0', textDecoration: done ? 'line-through' : 'none', marginBottom:3 }}>{d.theme}</div>
                          <div style={{ fontSize:11, color:'#475569', lineHeight:1.4 }}>{d.note}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        )}

        {/* ===== METHOD ===== */}
        {activeTab === 'method' && (
          <div style={{ paddingTop:16 }}>
            <div style={{ padding:16, background:'linear-gradient(135deg,rgba(124,111,255,0.15),rgba(168,85,247,0.1))', border:'1px solid rgba(124,111,255,0.3)', borderRadius:16, marginBottom:14 }}>
              <div style={{ fontSize:13, color:'#a78bfa', fontWeight:700, marginBottom:6 }}>🧠 MÉTODO R.E.P.</div>
              <div style={{ fontSize:13, color:'#94a3b8', lineHeight:1.6 }}>Cada tema passa por 3 fases para ir da memória de curto prazo para a de longo prazo. Seguindo o cronograma, esse processo acontece automaticamente.</div>
            </div>
            {[
              { step:'R', color:'#3b82f6', label:'RECONHECER',  subtitle:'Dia de Introdução — 10 min', icon:'📖', items:['Abra apenas o tema do dia no app','Leia cada palavra + tradução sem pressa','Ouça o áudio de TODAS as palavras','NÃO tente memorizar ainda — apenas se exponha','Ao final, tente lembrar 3 palavras de cabeça'] },
              { step:'E', color:'#22c55e', label:'EXERCITAR',    subtitle:'Dia de Prática — 10 min', icon:'🎯', items:['Faça as atividades indicadas no cronograma','Se errar, reveja a palavra antes de continuar','Use os 3 modos: Múltipla Escolha → Complete → Pares','Tente escrever 2 frases usando palavras novas','Antes de dormir, tente lembrar 5 palavras'] },
              { step:'P', color:'#f59e0b', label:'PERSISTIR',    subtitle:'Dias de Revisão — 10 min', icon:'🔄', items:['Revise os temas do bloco em modo misto','Foque mais tempo nas palavras que esqueceu','A revisão espaçada é o que faz a palavra NUNCA sair','Cada revisão dobra o tempo que você vai lembrar','Não pule os dias de revisão — são os mais valiosos'] },
            ].map(({ step, color, label, subtitle, icon, items }) => (
              <div key={step} style={{ marginBottom:12, border:`1px solid ${color}33`, borderRadius:14, overflow:'hidden' }}>
                <div style={{ display:'flex', alignItems:'center', gap:12, padding:'14px 16px', background:`${color}18` }}>
                  <div style={{ width:38, height:38, borderRadius:12, background:color, display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0, boxShadow:`0 0 12px ${color}55` }}>{icon}</div>
                  <div>
                    <div style={{ fontSize:15, fontWeight:800, color }}>{step} — {label}</div>
                    <div style={{ fontSize:11, color:'#64748b' }}>{subtitle}</div>
                  </div>
                </div>
                <div style={{ padding:'12px 16px' }}>
                  {items.map((item, i) => (
                    <div key={i} style={{ display:'flex', gap:10, marginBottom: i<items.length-1 ? 8 : 0 }}>
                      <div style={{ width:20, height:20, borderRadius:'50%', background:`${color}22`, border:`1px solid ${color}44`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, color, fontWeight:700, flexShrink:0 }}>{i+1}</div>
                      <div style={{ fontSize:13, color:'#94a3b8', lineHeight:1.5 }}>{item}</div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
            <div style={{ padding:16, background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:14 }}>
              <div style={{ fontSize:13, fontWeight:700, color:'#e2e8f0', marginBottom:8 }}>⚡ Por que 10 min funciona?</div>
              <div style={{ fontSize:13, color:'#64748b', lineHeight:1.7 }}>O cérebro consolida memórias durante o <span style={{ color:'#a78bfa' }}>sono</span>. Cada sessão diária de 10 min planta uma semente. Enquanto você dorme, o hipocampo move essas informações para a memória de longo prazo. No dia seguinte, a revisão rega essa semente. Após 3 revisões espaçadas, a palavra fica permanente. Esse processo se chama <span style={{ color:'#a78bfa' }}>Consolidação Mnêmica</span>.</div>
            </div>
          </div>
        )}

        {/* ===== TIPS ===== */}
        {activeTab === 'tips' && (
          <div style={{ paddingTop:16 }}>
            {TIPS.map((tip, i) => (
              <div key={i} style={{ marginBottom:10, padding:16, background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:14, display:'flex', gap:14 }}>
                <div style={{ width:44, height:44, background:'rgba(124,111,255,0.15)', borderRadius:12, display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, flexShrink:0, border:'1px solid rgba(124,111,255,0.2)' }}>{tip.icon}</div>
                <div>
                  <div style={{ fontSize:14, fontWeight:700, color:'#e2e8f0', marginBottom:5 }}>{tip.title}</div>
                  <div style={{ fontSize:13, color:'#64748b', lineHeight:1.6 }}>{tip.desc}</div>
                </div>
              </div>
            ))}
            <div style={{ marginTop:20, textAlign:'center' }}>
              <button onClick={() => { if(window.confirm('Apagar todo o progresso?')) { setCompleted({}); localStorage.removeItem('vq-sched-v1'); } }} style={{ padding:'10px 24px', borderRadius:10, border:'1px solid rgba(239,68,68,0.3)', background:'rgba(239,68,68,0.08)', color:'#f87171', fontSize:13, cursor:'pointer' }}>🗑️ Resetar progresso</button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
